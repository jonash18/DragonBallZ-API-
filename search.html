<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>DBZ | Character Search</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        @font-face {
            font-family: 'SaiyanSans';
            src: url('Saiyan-Sans.ttf') format('truetype');
        }

        :root {
            --glass: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.15);
            --accent-gold: #ffcc00;
        }

        body {
            background-color: #0d0d0e;
            background-image: linear-gradient(rgba(0, 0, 0, 0.8), rgba(0, 0, 0, 0.8)), url('sbg.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: #e0e0e0;
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
        }

        /* Nav Buttons */
        .nav-link-custom {
            background: var(--glass);
            border: 1px solid var(--glass-border);
            color: white;
            text-decoration: none;
            padding: 10px 20px;
            border-radius: 50px;
            font-size: 0.9rem;
            transition: 0.3s;
            backdrop-filter: blur(5px);
        }

        .nav-link-custom:hover {
            background: var(--accent-gold);
            color: black;
            border-color: var(--accent-gold);
        }

        /* Title */
        .dragonball-title {
            font-family: 'SaiyanSans', sans-serif;
            font-size: clamp(50px, 8vw, 90px);
            color: var(--accent-gold);
            text-align: center;
            margin: 40px 0;
            -webkit-text-stroke: 1px #000;
            filter: drop-shadow(0 0 15px rgba(255, 204, 0, 0.4));
        }

        /* Search Interface */
        .search-container {
            background: var(--glass);
            backdrop-filter: blur(10px);
            border: 1px solid var(--glass-border);
            padding: 30px;
            border-radius: 30px;
            margin-bottom: 50px;
        }

        .form-control-modern {
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid var(--glass-border);
            color: white !important;
            border-radius: 15px;
            padding: 15px 25px;
        }

        .form-control-modern:focus {
            background: rgba(0, 0, 0, 0.6);
            border-color: var(--accent-gold);
            box-shadow: 0 0 15px rgba(255, 204, 0, 0.2);
        }

        .btn-go {
            background: var(--accent-gold);
            color: black;
            font-weight: 800;
            border-radius: 15px;
            padding: 15px;
            width: 100%;
            border: none;
            transition: 0.3s;
        }

        .btn-go:hover {
            background: #ffdb4d;
            transform: scale(1.02);
        }

        /* Character Card */
        .char-card {
            background: var(--glass);
            backdrop-filter: blur(15px);
            border: 1px solid var(--glass-border);
            border-radius: 30px;
            padding: 40px;
            transition: 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            max-width: 600px;
            margin: 0 auto;
        }

        .char-image-container {
            height: 400px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 30px;
        }

        .char-img {
            max-height: 100%;
            filter: drop-shadow(0 10px 20px rgba(0,0,0,0.5));
            transition: 0.4s ease;
        }

        .char-card:hover .char-img {
            transform: scale(1.05) translateY(-10px);
        }

        .char-name {
            font-family: 'SaiyanSans', sans-serif;
            font-size: 45px;
            color: #fff;
            margin-bottom: 20px;
        }

        .stats-box {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 20px;
            padding: 20px;
            text-align: left;
        }

        .stat-item {
            font-size: 1.1rem;
            margin-bottom: 8px;
            display: flex;
            justify-content: space-between;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            padding-bottom: 5px;
        }

        .stat-label {
            color: var(--accent-gold);
            font-weight: 700;
            text-transform: uppercase;
        }

        .stat-value {
            color: #fff;
        }
    </style>
</head>

<body>

    <div class="container-fluid pt-4 px-4">
        <div class="d-flex justify-content-between">
            <a href="https://jonash18.github.io/" class="nav-link-custom">Profile</a>
            <a href="index.html" class="nav-link-custom">Back to List</a>
        </div>
        <h1 class="dragonball-title">Character Radar</h1>
    </div>

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-8 col-lg-6">
                <div class="search-container shadow">
                    <div class="row g-2">
                        <div class="col-9">
                            <input type="text" placeholder="Enter Character ID (e.g. 1)" 
                                   class="form-control form-control-modern" id="searchInput">
                        </div>
                        <div class="col-3">
                            <button class="btn btn-go" onclick="getCharacter()">GO</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div id="contentArea" class="row justify-content-center pb-5">
            </div>
    </div>

    <script>
        const colors = {
            "Saiyan": "rgba(255, 216, 168, 0.15)",
            "Human": "rgba(255, 243, 176, 0.15)",
            "Namekian": "rgba(200, 247, 197, 0.15)",
            "Frieza Race": "rgba(229, 199, 255, 0.15)",
            "Android": "rgba(205, 235, 255, 0.15)",
            "Majin": "rgba(249, 198, 232, 0.15)",
            "God": "rgba(199, 237, 255, 0.15)",
            "Angel": "rgba(214, 232, 255, 0.15)",
            "Demon": "rgba(212, 198, 255, 0.15)",
            "Kai": "rgba(227, 236, 255, 0.15)",
            "Tuffle": "rgba(255, 201, 201, 0.15)",
            "Beastman": "rgba(238, 217, 166, 0.15)",
            "Alien": "rgba(201, 217, 255, 0.15)",
            "Bio-Android": "rgba(212, 248, 212, 0.15)",
            "Jiren Race": "rgba(229, 229, 229, 0.15)"
        };

        const contentArea = document.getElementById("contentArea");
        const searchInput = document.getElementById("searchInput");

        const getCharacter = async () => {
            if(!searchInput.value) return;
            
            const response = await fetch('https://dragonball-api.com/api/characters/' + searchInput.value);
            const characterData = await response.json();
            
            if (!characterData || characterData.error) {
                contentArea.innerHTML = `
                <div class="col-12">
                    <div class="char-card text-center">
                        <img src="notfound.png" style="height: 150px;" class="mb-4">
                        <h2 class="char-name" style="font-size: 30px;">NOT FOUND</h2>
                        <p>The scouter couldn't find that life signature.</p>
                    </div>
                </div>`;
                return;
            }

            const raceColor = colors[characterData.race] || "rgba(255,255,255,0.05)";

            contentArea.innerHTML = `
                <div class="col-12">
                    <div class="char-card" style="background: ${raceColor}; border-color: ${raceColor}">
                        <div class="char-image-container">
                            <img src="${characterData.image}" class="char-img">
                        </div>
                        <div class="text-center">
                            <p class="text-muted small mb-0">ID: ${characterData.id}</p>
                            <h2 class="char-name">${characterData.name}</h2>
                            <div class="stats-box">
                                <div class="stat-item">
                                    <span class="stat-label">Gender</span>
                                    <span class="stat-value">${characterData.gender}</span>
                                </div>
                                <div class="stat-item">
                                    <span class="stat-label">Race</span>
                                    <span class="stat-value">${characterData.race}</span>
                                </div>
                                <div class="stat-item">
                                    <span class="stat-label">Base KI</span>
                                    <span class="stat-value">${characterData.ki}</span>
                                </div>
                                <div class="stat-item" style="border:none">
                                    <span class="stat-label">Max KI</span>
                                    <span class="stat-value">${characterData.maxKi}</span>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>`;
        }

        // Support Enter Key
        searchInput.addEventListener("keypress", (e) => {
            if (e.key === "Enter") getCharacter();
        });
    </script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>

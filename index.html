<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Dragon Ball Z</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>

<style>
    @font-face {
        font-family: 'SaiyanSans';
        src: url('Saiyan-Sans.ttf') format('truetype');
    }

    .h3 {
        font-family: 'SaiyanSans', sans-serif;
        font-size: 50px;
        color: #ffcc00;
        -webkit-text-stroke: 3px #000;
    }

    .description {
        font-family: 'SaiyanSans', sans-serif;
        font-size: 20px;
    }

    .dragonball-title {
        font-family: 'SaiyanSans', sans-serif;
        font-weight: bold;
        text-align: center;
        margin: 20px 0;
        font-size: clamp(80px, 8vw, 120px);
        transition: all 0.4s ease;
    }

    .dbz {
        color: #ffcc00;
        -webkit-text-stroke: 6px #000;
        text-shadow:
            4px 4px 0 #d40000,
            6px 6px 0 #000;
    }


    .ki-aura {
        animation: kiGlow 5s infinite ease-in-out;
    }

    @keyframes kiGlow {
        0% {
            filter: drop-shadow(0 0 5px #ffd700);
        }

        50% {
            filter: drop-shadow(0 0 25px #ffea00) drop-shadow(0 0 40px #ffea00);
        }

        100% {
            filter: drop-shadow(0 0 5px #ffd700);
        }
    }

    .dragonball-title:hover {
        transform: scale(1.1) rotate(-1deg);
        filter: brightness(1.3) saturate(1.4);
        text-shadow:
            0 0 20px #fff,
            0 0 40px #ffdd00,
            0 0 60px #ffdd00;
    }

    /* minimal CSS only to set images per breakpoint */
    .bg-img-desktop {
        background-image: url('bg.jpg');
        background-size: cover;
        background-position: center;
        background-repeat: no-repeat;
        background-attachment: fixed;
        min-height: 100vh;
    }

    @media (max-width:1199.98px) {
        .bg-img-desktop {
            background-image: url('bgm.jpg');
        }
    }

    @media (max-width:767.98px) {
        .bg-img-desktop {
            background-image: url('bgm.jpg');
            background-attachment: fixed;
        }
    }

    .card img {
        transition: transform 0.3s ease;
    }

    .card img:hover {
        transform: scale(1.08);
        filter: drop-shadow(0 0 10px #ffdd00);
    }
</style>

<body class="bg-img-desktop">



    <div class="container-fluid position-relative p-5">
        <a href="search.html" class="position-absolute top-0 end-0 m-4">
            <button class="btn text-light p-2">Search</button>
        </a>
        <a href="https://jonash18.github.io/" class="position-absolute top-0 end-1 m-4">
            <button class="btn text-light p-2">Profile</button>
        </a>
        <h1 class="dragonball-title dbz ki-aura text-center">DRAGON BALL Z</h1>

    </div>
    <div class="container">
        <div class="row pt-5">
            <div class="col">
                <div id="pageText">
                    Page 1
                </div>
            </div>
        </div>
    </div>
    <div class="container my-1">
        <div class="row" id="contentArea">
        </div>
    </div>
    <div class="container my-3">
        <div class="row">
            <div class="col">
                <nav aria-label="Page navigation example" class="d-flex justify-content-center">
                    <ul class="pagination">
                        <li class="page-item">
                            <a class="page-link" aria-label="Previous" onclick="prevPage()">
                                <span aria-hidden="true">&laquo;</span>
                            </a>
                        </li>
                        <li class="page-item">
                            <a class="page-link" aria-label="Next" onclick="nextPage()">
                                <span aria-hidden="true">&raquo;</span>
                            </a>
                        </li>
                    </ul>
                </nav>
            </div>
        </div>
    </div>


    <script>
        const colors = {
            "Saiyan": "#FFD8A8",
            "Human": "#FFF3B0",
            "Namekian": "#C8F7C5",
            "Frieza Race": "#E5C7FF",
            "Android": "#CDEBFF",
            "Majin": "#F9C6E8",
            "God": "#C7EDFF",
            "Angel": "#D6E8FF",
            "Demon": "#D4C6FF",
            "Kai": "#E3ECFF",
            "Tuffle": "#FFC9C9",
            "Beastman": "#EED9A6",
            "Alien": "#C9D9FF",
            "Bio-Android": "#D4F8D4",
            "Jiren Race": "#E5E5E5"

        };

        var contentArea = document.getElementById("contentArea");
        var pageText = document.getElementById("pageText");

        var page = 1;

        function prevPage() {
            if (page === 1) return;
            page--;
            pageText.innerHTML = "Page " + page;
            contentArea.innerHTML = "";
            getCharacter();
        }

        function nextPage() {
            page++;
            pageText.innerHTML = "Page " + page;
            contentArea.innerHTML = "";
            getCharacter();
        }

        const getCharacter = async () => {
            for (var i = (12 * page) - 11; i <= page * 12; i++) {
                const response = await fetch('https://dragonball-api.com/api/characters/' + i);
                const characterData = await response.json();

                if (!characterData || characterData.error) {
                    contentArea.innerHTML += `
                <div class="col-12 col-md-6 col-lg-4">
                <div class="card p-5 rounded-5 my-4 text-center";>
                    <div style="width: 200px; height: 400px; " class="rounded-circle mx-auto">
                    <img class="card-img-top img-fluid" src="notfound.png" style="height: 200px;">
                    </div>
                    <div class="h3 my-3">
                    Ops! Sorry!
                    </div>
                    <div class="mt-3 px-5">
                    <div class="border rounded-5 p-2">
                        Character ID Not Found
                    </div>
                    </div>
                </div>
                </div>
                `;
                    continue;
                };


                name = characterData.name;
                id = characterData.id;
                picture = characterData.image;
                ki = characterData.ki;
                maxKi = characterData.maxKi;
                race = characterData.race;
                gender = characterData.gender;

                contentArea.innerHTML += `
                <div class="col-12 col-md-6 col-lg-4">
                <div class="card p-5 rounded-5 my-4 text-center" style="background-color: `+ colors[race] + `;">
                    <div style="width: 200px; height: 400px;" class="rounded-circle mx-auto">
                    <img class="card-img-top img-fluid" src="`+ picture + `" style="height: 400px;">
                    </div>
                    <div class="h3 my-3" >
                    ID:`+ id + ` ` + name + `
                    </div>
                    <div class="mt-3 px-5">
                    <div class="description border rounded-3 p-2 text-start">
                        Gender: `+ gender + `<br>
                        Race: `+ race + `<br>
                        ki: `+ ki + `<br>
                        maxKi: `+ maxKi + `
                    </div>
                    </div>
                </div>
                </div>
                `;
            }
        }

        getCharacter();
    </script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
</body>

</html>

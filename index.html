<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>DBZ | Character Universe</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
</head>

<style>
    @font-face {
        font-family: 'SaiyanSans';
        src: url('Saiyan-Sans.ttf') format('truetype');
    }

    :root {
        --glass: rgba(255, 255, 255, 0.03);
        --glass-border: rgba(255, 255, 255, 0.1);
        --accent-gold: #ffcc00;
    }
    

    /* Keep the stat labels yellow for contrast */
    .stat-label {
        color: var(--accent-gold);
    }

    body {
        background-color: #0a0a0b;
        color: #e0e0e0;
        font-family: 'Inter', sans-serif;
        min-height: 100vh;
        overflow-x: hidden;
    }

    /* Background Overlay for Premium Feel */
    .bg-overlay {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background-image: linear-gradient(rgba(10, 10, 11, 0.8), rgba(10, 10, 11, 0.8)), url('bg.jpg');
        background-size: cover;
        background-position: center;
        background-attachment: fixed;
        z-index: -1;
    }

    /* Header Styling */
    .dragonball-title {
        font-family: 'SaiyanSans', sans-serif;
        font-size: clamp(60px, 10vw, 100px);
        color: var(--accent-gold);
        text-align: center;
        text-transform: uppercase;
        letter-spacing: 4px;
        margin-top: 40px;
        -webkit-text-stroke: 2px #000;
        filter: drop-shadow(0 0 15px rgba(255, 204, 0, 0.3));
    }

    /* Modern Glass Cards */
    .card {
        background: var(--glass);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        border: 1px solid var(--glass-border);
        border-radius: 24px;
        transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        height: 100%;
        overflow: hidden;
    }

    .card:hover {
        transform: translateY(-12px);
        border-color: rgba(255, 204, 0, 0.5);
        box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
    }

    .card-img-container {
        position: relative;
        padding: 20px;
        height: 320px;
        display: flex;
        align-items: center;
        justify-content: center;
    }

    .card-img-top {
        height: 100%;
        width: auto;
        object-fit: contain;
        filter: drop-shadow(0 10px 15px rgba(0,0,0,0.5));
        transition: transform 0.4s ease;
    }

    .card:hover .card-img-top {
        transform: scale(1.1) rotate(2deg);
    }

    .char-name {
        font-family: 'SaiyanSans', sans-serif;
        font-size: 32px;
        color: #fff;
        margin-bottom: 5px;
    }

    .stats-grid {
        background: rgba(0, 0, 0, 0.3);
        border-radius: 16px;
        padding: 15px;
        font-size: 13px;
        text-transform: uppercase;
        letter-spacing: 1px;
    }

    .stat-label {
        color: var(--accent-gold);
        font-weight: 800;
        margin-right: 5px;
    }

    /* Custom Navigation */
    .nav-btn {
        background: var(--glass);
        border: 1px solid var(--glass-border);
        color: #fff;
        padding: 12px 25px;
        border-radius: 50px;
        transition: 0.3s;
        backdrop-filter: blur(5px);
    }

    .nav-btn:hover {
        background: var(--accent-gold);
        color: #000;
        border-color: var(--accent-gold);
    }

    .page-indicator {
        font-weight: 800;
        color: var(--accent-gold);
        letter-spacing: 2px;
        text-transform: uppercase;
    }

    /* Race-based glow (Applied via JS) */
    .glow-Saiyan { box-shadow: inset 0 0 20px rgba(255, 216, 168, 0.1); }
    .glow-Namekian { box-shadow: inset 0 0 20px rgba(200, 247, 197, 0.1); }
</style>

<body>
    <div class="bg-overlay"></div>

    <div class="container-fluid position-relative pt-4 px-5">
        <div class="d-flex justify-content-end gap-2">
            <a href="search.html" class="nav-btn text-decoration-none">Search</a>
            <a href="https://jonash18.github.io/" class="nav-btn text-decoration-none">Profile</a>
        </div>
        <h1 class="dragonball-title">Universe Explorer</h1>
    </div>

    <div class="container mt-4">
        <div class="d-flex justify-content-between align-items: center; mb-4 px-3">
            <div class="page-indicator" id="pageText">PAGE 01</div>
            <div class="d-flex gap-2">
                <button class="nav-btn" onclick="prevPage()">← PREV</button>
                <button class="nav-btn" onclick="nextPage()">NEXT →</button>
            </div>
        </div>

        <div class="row g-4" id="contentArea">
            </div>
    </div>

    <footer class="py-5 text-center opacity-50">
        <small>&copy; 2026 JONASH B. VALENCIA | POWERED BY DRAGONBALL API</small>
    </footer>

    <script>
        const colors = {
            "Saiyan": "#FFD8A8",
            "Human": "#FFF3B0",
            "Namekian": "#C8F7C5",
            "Frieza Race": "#E5C7FF",
            "Android": "#CDEBFF",
            "Majin": "#F9C6E8",
            "God": "#C7EDFF",
            "Angel": "#D6E8FF",
            "Demon": "#D4C6FF",
            "Kai": "#E3ECFF",
            "Tuffle": "#FFC9C9",
            "Beastman": "#EED9A6",
            "Alien": "#C9D9FF",
            "Bio-Android": "#D4F8D4",
            "Jiren Race": "#E5E5E5"
        };

        var contentArea = document.getElementById("contentArea");
        var pageText = document.getElementById("pageText");
        var page = 1;

        function prevPage() {
            if (page === 1) return;
            page--;
            updateUI();
        }

        function nextPage() {
            page++;
            updateUI();
        }

        function updateUI() {
            pageText.innerHTML = "PAGE " + (page < 10 ? "0" + page : page);
            contentArea.innerHTML = "";
            window.scrollTo({ top: 0, behavior: 'smooth' });
            getCharacter();
        }

        const getCharacter = async () => {
            for (var i = (12 * page) - 11; i <= page * 12; i++) {
                try {
                    const response = await fetch('https://dragonball-api.com/api/characters/' + i);
                    const characterData = await response.json();

                    if (!characterData || characterData.error) {
                        renderErrorCard();
                        continue;
                    }

                    renderCharacterCard(characterData);
                } catch (e) {
                    renderErrorCard();
                }
            }
        }

        function renderCharacterCard(data) {
            const raceColor = colors[data.race] || "#ffffff";
            contentArea.innerHTML += `
                <div class="col-12 col-md-6 col-lg-4 col-xl-3">
                    <div class="card p-3">
                        <div class="card-img-container">
                            <img src="${data.image}" class="card-img-top" alt="${data.name}">
                        </div>
                        <div class="card-body text-center text-white p-2">
                            <div class="text-muted small mb-1">#${data.id.toString().padStart(3, '0')}</div>
                            <h2 class="char-name">${data.name}</h2>
                            <div class="stats-grid text-start">
                                <div class="mb-1"><span class="stat-label">Race:</span> ${data.race}</div>
                                <div class="mb-1"><span class="stat-label">Gender:</span> ${data.gender}</div>
                                <div class="mb-1"><span class="stat-label">Base Ki:</span> ${data.ki}</div>
                                <div><span class="stat-label">Max Ki:</span> ${data.maxKi}</div>
                            </div>
                        </div>
                        <div style="height: 4px; background: ${raceColor}; width: 100%; position: absolute; bottom: 0; left: 0; opacity: 0.6;"></div>
                    </div>
                </div>
            `;
        }

        function renderErrorCard() {
            contentArea.innerHTML += `
                <div class="col-12 col-md-6 col-lg-4 col-xl-3">
                    <div class="card p-5 text-center opacity-75">
                        <img src="notfound.png" style="height: 100px; object-fit: contain;" class="mx-auto mb-3">
                        <h4 class="text-white">OUT OF RANGE</h4>
                        <p class="small">Character data vanished from the radar.</p>
                    </div>
                </div>
            `;
        }

        getCharacter();
    </script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
